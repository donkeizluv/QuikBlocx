<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuikBlocx</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="hero">
        <p class="eyebrow">Alert Mode</p>
        <h1>QuikBlocx</h1>
        <p class="subtitle">A cure for X bot infestation.</p>
      </header>

      <section class="card">
        <div class="speech-bubble">
          <strong>Pow!</strong> Scan the active X tab and inspect every post we can currently see.
        </div>

        <div class="stats">
          <div class="stat">
            <span class="stat-label">Posts Spotted</span>
            <strong id="post-count" class="stat-value">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">Signal Status</span>
            <strong id="tab-status" class="stat-value stat-value-small">Waiting</strong>
          </div>
        </div>

        <button id="refresh-button" type="button">Scan This Timeline</button>
        <p id="status" class="status" aria-live="polite"></p>

        <div class="section-heading">
          <span class="section-kicker">Scene Report</span>
          <h2>Visible Posts</h2>
        </div>

        <div id="posts-list" class="posts-list" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
