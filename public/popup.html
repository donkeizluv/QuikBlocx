<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuikBlocx</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">X Companion</p>
      <h1>QuikBlocx</h1>
      <p class="subtitle">Live post scan for the current X timeline.</p>

      <section class="card">
        <div class="stats">
          <div class="stat">
            <span class="stat-label">Posts found</span>
            <strong id="post-count" class="stat-value">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">Tab status</span>
            <strong id="tab-status" class="stat-value stat-value-small">Waiting</strong>
          </div>
        </div>

        <button id="refresh-button" type="button">Refresh scan</button>
        <p id="status" class="status" aria-live="polite"></p>

        <div id="posts-list" class="posts-list" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
